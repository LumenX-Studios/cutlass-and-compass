    <text transform="rotate(-129.71 100 100) translate(0 -82) rotate(90)">A</text>
    <text transform="rotate(-120.88 100 100) translate(0 -82) rotate(90)">S</text>
    <text transform="rotate(-112.06 100 100) translate(0 -82) rotate(90)">S</text>
    <text transform="rotate(-103.24 100 100) translate(0 -82) rotate(90)">•</text>
    <text transform="rotate(-94.41 100 100) translate(0 -82) rotate(90)">C</text>
    <text transform="rotate(-85.59 100 100) translate(0 -82) rotate(90)">O</text>
    <text transform="rotate(-76.76 100 100) translate(0 -82) rotate(90)">M</text>
    <text transform="rotate(-67.94 100 100) translate(0 -82) rotate(90)">P</text>
    <text transform="rotate(-59.12 100 100) translate(0 -82) rotate(90)">A</text>
    <text transform="rotate(-50.29 100 100) translate(0 -82) rotate(90)">S</text>
    <text transform="rotate(-41.47 100 100) translate(0 -82) rotate(90)">S</text>
    <text transform="rotate(-32.65 100 100) translate(0 -82) rotate(90)">L</text>
    <text transform="rotate(-23.82 100 100) translate(0 -82) rotate(90)">L</text>
    <text transform="rotate(-15 100 100) translate(0 -82) rotate(90)">C</text>
