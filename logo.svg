<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Cutlass and Compass LLC institutional seal">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%"  stop-color="#004225" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#00331d" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#001a0f" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#001a0f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#001a0f" stop-opacity="0.65"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- baked background so export matches screenshot -->
  <rect x="0" y="0" width="200" height="200" fill="url(#bg)"/>
  <rect x="0" y="0" width="200" height="200" fill="url(#vignette)"/>

  <path id="topArc" d="M 18,100 A 82,82 0 0,1 182,100" fill="none"/>
  <circle cx="100" cy="100" r="91" fill="none" stroke="#D4AF37" stroke-width="1.3" filter="url(#softGlow)"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#D4AF37" stroke-width=".4" opacity=".55"/>
  <!-- Arc text without textPath (more compatible) -->
  <g fill="#D4AF37" font-size="7.8" font-family="'Cormorant SC',serif" text-anchor="middle" dominant-baseline="middle">
